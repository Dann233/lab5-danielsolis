<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Daniel Solis</title>
  <link rel="stylesheet" href="global.css" />
</head>
<body>

  <div class="app-wrapper">
    <header class="app-header">
      <h1 class="app-title">Mis Tareas</h1>
      <p class="task-counter" id="counter">0 tareas pendientes</p>
    </header>

    <div class="input-section">
      <input
        type="text"
        id="task-input"
        class="task-input"
        placeholder="Escribe una nueva tarea..."
        maxlength="120"
      />
      <button id="add-btn" class="btn-add">Agregar</button>
    </div>

    <p id="error-msg" class="error-msg hidden">⚠ No puedes agregar una tarea vacía.</p>

    <ul id="task-list" class="task-list"></ul>

    <p id="empty-state" class="empty-state">¡Sin tareas por ahora! Agrega una arriba.</p>
  </div>

  <script src="main.js"></script>
</body>
</html>
